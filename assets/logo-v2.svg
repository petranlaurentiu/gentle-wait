<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#141A32"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </radialGradient>

    <linearGradient id="drop" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="30%" stop-color="#00B4D8"/>
      <stop offset="55%" stop-color="#6C63FF"/>
      <stop offset="80%" stop-color="#9B5DE5"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.5"/>
    </linearGradient>

    <radialGradient id="glass" cx="36%" cy="28%" r="38%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.50"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6B9D"/>
    </linearGradient>

    <radialGradient id="innerGlow" cx="50%" cy="56%" r="30%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
    </filter>

    <clipPath id="dropClip">
      <path d="M256 72 C212 142,146 242,146 312 C146 388,194 448,256 448 C318 448,366 388,366 312 C366 242,300 142,256 72Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="310" rx="140" ry="160" fill="#00D4FF" opacity="0.06" filter="url(#ambient)"/>
  <ellipse cx="275" cy="350" rx="110" ry="130" fill="#A855F7" opacity="0.05" filter="url(#ambient)"/>

  <!-- Main droplet -->
  <g filter="url(#glow)">
    <path
      d="M256 72 C212 142,146 242,146 312 C146 388,194 448,256 448 C318 448,366 388,366 312 C366 242,300 142,256 72Z"
      fill="url(#drop)"/>
  </g>

  <!-- Edge stroke -->
  <path
    d="M256 72 C212 142,146 242,146 312 C146 388,194 448,256 448 C318 448,366 388,366 312 C366 242,300 142,256 72Z"
    fill="none" stroke="url(#edge)" stroke-width="1.5"/>

  <!-- Clipped interior -->
  <g clip-path="url(#dropClip)">

    <!-- Inner glow -->
    <ellipse cx="256" cy="315" rx="100" ry="65" fill="url(#innerGlow)"/>

    <!-- Glass highlight -->
    <ellipse cx="228" cy="215" rx="75" ry="85" fill="url(#glass)"/>

    <!-- Upper echo wave -->
    <path
      d="M195 278 C215 256,237 256,256 278 C275 300,297 300,317 278"
      stroke="url(#wave)" stroke-width="1.8" stroke-linecap="round"
      fill="none" opacity="0.18"/>

    <!-- Main breath wave -->
    <path
      d="M172 310 C198 274,228 274,256 310 C284 346,314 346,340 310"
      stroke="url(#wave)" stroke-width="3.5" stroke-linecap="round"
      fill="none" opacity="0.7"/>

    <!-- Lower echo wave -->
    <path
      d="M184 340 C206 312,232 312,256 340 C280 368,306 368,328 340"
      stroke="url(#wave)" stroke-width="2.2" stroke-linecap="round"
      fill="none" opacity="0.3"/>

    <!-- Rising light particles -->
    <circle cx="224" cy="202" r="3"   fill="#FFFFFF" opacity="0.30"/>
    <circle cx="289" cy="185" r="2"   fill="#FFFFFF" opacity="0.22"/>
    <circle cx="256" cy="148" r="2.5" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="238" cy="260" r="2"   fill="#FFFFFF" opacity="0.16"/>
    <circle cx="282" cy="252" r="2.5" fill="#FFFFFF" opacity="0.14"/>
    <circle cx="256" cy="118" r="1.5" fill="#FFFFFF" opacity="0.12"/>
    <circle cx="270" cy="400" r="2"   fill="#FFFFFF" opacity="0.10"/>
    <circle cx="240" cy="390" r="1.5" fill="#FFFFFF" opacity="0.08"/>

  </g>
</svg>
